name: Build & Release

# Two entry points:
#   â€˘ push a tag `vX.Y.Z`           â†’ stable release, version pinned to the tag
#   â€˘ Run workflow (manual dispatch) â†’ build any ref:
#       - a tag `vX.Y.Z`            â†’ that stable release
#       - a branch (default develop) â†’ rolling `nightly` pre-release, version stamped per build
# node-pty is a native module that can't be cross-compiled, so every OS builds on its own runner.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to build (tag vX.Y.Z â†’ that release; branch like develop â†’ nightly)'
        required: true
        default: develop

permissions:
  contents: write # create releases + upload assets â€” GITHUB_TOKEN is enough, no PAT needed

# Supersede an in-flight build of the same ref (matters if nightly is ever wired to auto-run on push).
concurrency:
  group: build-${{ github.event.inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  # Resolve the ref once â€” which commit, what version string, stable vs nightly â€” so the rule lives in
  # exactly one place and every downstream job just reads these outputs.
  meta:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      sha: ${{ steps.resolve.outputs.sha }}
      version: ${{ steps.resolve.outputs.version }}
      channel: ${{ steps.resolve.outputs.channel }}
      updaterChannel: ${{ steps.resolve.outputs.updaterChannel }}
    steps:
      - name: Pick ref
        id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ github.event.inputs.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.pick.outputs.ref }}
      - name: Resolve version & channel
        id: resolve
        run: |
          REF="${{ steps.pick.outputs.ref }}"
          SHA="$(git rev-parse HEAD)"
          BASE="$(node -p "require('./package.json').version")"
          # A vX.Y.Z ref (whether pushed as a tag or typed into the dispatch box) is a stable release;
          # anything else (a branch) is a nightly. updaterChannel is the electron-updater channel that names
          # the generated metadata file: stable â†’ latest.yml, nightly â†’ nightly.yml â€” so a nightly build only
          # ever sees nightly releases and a stable build only stable (doc 56 Â§7.1), the app side picking its
          # channel from its own -nightly version tag.
          if printf '%s' "$REF" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+'; then
            CHANNEL=stable
            UPDATER_CHANNEL=latest
            VERSION="${REF#v}"
          else
            CHANNEL=nightly
            UPDATER_CHANNEL=nightly
            # Pure numeric UTC timestamp â†’ a semver-sortable, MONOTONIC prerelease even for same-day rebuilds
            # (the old .g<sha> suffix sorted lexically by sha, not by time, so a newer same-day build could be
            # judged older). The sha stays in the release notes for traceability; keeping it OUT of the version
            # avoids a '+'/'.sha' token landing in asset names and download URLs.
            VERSION="${BASE}-nightly.$(date -u +%Y%m%d%H%M%S)"
          fi
          {
            echo "ref=$REF"
            echo "sha=$SHA"
            echo "version=$VERSION"
            echo "channel=$CHANNEL"
            echo "updaterChannel=$UPDATER_CHANNEL"
          } >> "$GITHUB_OUTPUT"
          echo "Building $REF â†’ $CHANNEL $VERSION ($SHA)"

  # One runner per OS: node-pty must be compiled on its target platform against Electron's ABI (the
  # postinstall hooks do the rebuild during `npm ci`), so a single host can't produce all three.
  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26 # pinned to the newest fixed GA image our toolchain supports: Apple Silicon (arm64 â€” matches --arm64; node-pty can't cross-compile) + Xcode/clang (no node-gyp VS ceiling). Matches the macOS 26 dev box. Pinned, not macos-latest, for reproducible builds.
            args: --mac --arm64
          - os: windows-2022 # pinned to the newest fixed image our toolchain supports: windows-2025 ships VS 2026 (v18), which @electron/rebuild's node-gyp 10.2 can't parse ("unsupported version: 18") â†’ node-pty rebuild fails. VS 2022 (v17) is the newest it handles; bump to windows-2025 only after @electron/rebuild gains VS 2026 support.
            args: --win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.meta.outputs.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc # single source (Node 24, Active LTS) â€” matches local dev; ensure-electron.mjs repairs the Electron unpack
          cache: npm
      # `npm ci` runs postinstall: ensure-electron (repairs the Electron unpack) + rebuild-native
      # (compiles node-pty against Electron's ABI). Both are idempotent.
      - run: npm ci
      - name: Package
        shell: bash # uniform across runners (Windows defaults to pwsh) for the `&&` and arg splat
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false # MVP: unsigned â€” don't probe for a Developer ID identity
          # --- macOS signing + notarization placeholders: set these secrets later to enable it ---
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        # Pin the built version + the update channel; pack only â€” the release job publishes. channel names the
        # generated metadata file (nightly.yml vs latest.yml); it deep-merges into the publish object the same
        # way extraMetadata.version already does, so provider/owner/repo are preserved.
        run: npm run build && npx electron-builder ${{ matrix.args }} --publish never --config.publish.channel=${{ needs.meta.outputs.updaterChannel }} --config.extraMetadata.version=${{ needs.meta.outputs.version }}
      - uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.os }}
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.yml
            dist/*.blockmap

  # A single job owns the GitHub release, so the three build runners never race to create or update it.
  release:
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true # flatten all per-OS artifacts into one folder
      - name: Publish to GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Gather the actual installer + update-metadata files regardless of nesting depth.
          mapfile -t FILES < <(find artifacts -type f \( \
            -name '*.dmg' -o -name '*.zip' -o -name '*.exe' -o -name '*.AppImage' \
            -o -name '*.yml' -o -name '*.blockmap' \))
          echo "Found ${#FILES[@]} files to upload:"; printf '  - %s\n' "${FILES[@]}"
          if [ "${{ needs.meta.outputs.channel }}" = "stable" ]; then
            TAG="v${{ needs.meta.outputs.version }}"
            # Create the release (auto-notes from commits) if it's new; on a rerun, just refresh assets.
            gh release create "$TAG" --target "${{ needs.meta.outputs.sha }}" \
              --title "$TAG" --generate-notes "${FILES[@]}" \
              || gh release upload "$TAG" --clobber "${FILES[@]}"
          else
            # Rolling nightly: delete + recreate so stale assets never linger and the URL stays stable.
            gh release delete nightly --cleanup-tag --yes 2>/dev/null || true
            gh release create nightly --target "${{ needs.meta.outputs.sha }}" --prerelease \
              --title "Nightly (develop)" \
              --notes "Automated build from \`${{ needs.meta.outputs.ref }}\` @ \`${{ needs.meta.outputs.sha }}\`. Unsigned â€” see the README for first-launch steps." \
              "${FILES[@]}"
          fi
